services:
  mysql:
    image: mysql:8.4
    container_name: itamil-recruit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: itamil_recruit
      MYSQL_USER: itamil
      MYSQL_PASSWORD: itamil_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_dev"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: itamil-recruit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: itamil_recruit
      POSTGRES_USER: itamil
      POSTGRES_PASSWORD: itamil_dev
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itamil -d itamil_recruit"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg-data:

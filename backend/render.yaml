# Render Blueprint — provisions the backend + MySQL with one click.
# Push this file in the repo, then on Render dashboard pick
# "New Blueprint" and point at this file's path.
#
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: itamil-recruit-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /readyz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: itamil-mysql
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_MIN
        value: 15
      - key: JWT_REFRESH_TTL_DAYS
        value: 30
      - key: CORS_ORIGINS
        value: https://itamil-recruit.vercel.app  # update once you know the real URL
      - key: OTP_TTL_MIN
        value: 10
      - key: COOKIE_SECURE
        value: true

databases:
  - name: itamil-mysql
    databaseName: itamil_recruit
    user: itamil
    # NOTE: Render's managed MySQL is a paid product; on the free tier you
    # can swap this for a PostgreSQL instance (and change the Prisma
    # provider) — see backend/README.md for the Postgres switch.
    plan: free

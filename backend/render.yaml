# Render Blueprint — provisions the backend + a free Postgres with one click.
#
# How to use:
#   1. Push this file in the repo (already done).
#   2. On Render dashboard → "New" → "Blueprint" → pick the GitHub repo
#      → Render reads this file and creates both services.
#   3. Wait ~3 min for the first deploy.
#   4. Update CORS_ORIGINS below to your real frontend URL after Vercel
#      gives you the production link.
#
# Spec: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: itamil-recruit-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /readyz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: itamil-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_MIN
        value: 15
      - key: JWT_REFRESH_TTL_DAYS
        value: 30
      - key: CORS_ORIGINS
        # IMPORTANT: update this once you know your real Vercel URL.
        # Multiple origins comma-separated.
        value: https://itamil-recruit.vercel.app,http://localhost:5173
      - key: OTP_TTL_MIN
        value: 10
      - key: COOKIE_SECURE
        value: true

databases:
  - name: itamil-postgres
    databaseName: itamil_recruit
    user: itamil
    plan: free
    # Render's free Postgres tier is suspended after 30 days of inactivity
    # and dropped after 90 — fine for demo + early dev. Upgrade to paid once
    # you have real users.
